---

PIPELINE_REF_DATA: /path/to/reference/data

reference:
  coverage_bed: "{{PIPELINE_REF_DATA}}/refseq_select_mane_with_MT_with_non_coding_20240613.bed"
  design_bed: "{{PIPELINE_REF_DATA}}/homo_sapiens.hg38.wgs.bed"
  exome_bed: "{{PIPELINE_REF_DATA}}/Twist_Comprehensive_Exome_Covered_Targets_hg38.bed"
  exome_intervals: "{{PIPELINE_REF_DATA}}/Twist_Comprehensive_Exome_Covered_Targets_hg38.interval_list"
  fasta: "{{PIPELINE_REF_DATA}}/GCA_000001405.15_GRCh38_no_alt_analysis_set_GRCmasked.fasta"
  fai: "{{PIPELINE_REF_DATA}}/GCA_000001405.15_GRCh38_no_alt_analysis_set_GRCmasked.fasta.fai"
  genepanels: "config/gene_panels/genepanels_WGS.list"
  sites: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.known_indels.vcf.gz"
  wgs_intervals: "{{PIPELINE_REF_DATA}}/homo_sapiens.hg38.wgs.interval_list"
  str_panels_dir: "config/str_panels"
  str_panels:
    - "ataxi.list"
  merge_contigs: # contigs to be merged to a single BAM for mark duplicates
    - ".*_random"
    - "chrUn_.*"
    - "chrEBV"

bcftools_annotate:
  annotation_db: "config/skipAF/genes_hgnc_skipAF_280126.bed"

bwa_mem:
  amb: "{{PIPELINE_REF_DATA}}/GCA_000001405.15_GRCh38_no_alt_analysis_set_GRCmasked.fasta.amb"
  ann: "{{PIPELINE_REF_DATA}}/GCA_000001405.15_GRCh38_no_alt_analysis_set_GRCmasked.fasta.ann"
  bwt: "{{PIPELINE_REF_DATA}}/GCA_000001405.15_GRCh38_no_alt_analysis_set_GRCmasked.fasta.bwt"
  pac: "{{PIPELINE_REF_DATA}}/GCA_000001405.15_GRCh38_no_alt_analysis_set_GRCmasked.fasta.pac"
  sa: "{{PIPELINE_REF_DATA}}/GCA_000001405.15_GRCh38_no_alt_analysis_set_GRCmasked.fasta.sa"

bwa_mem_mito:
  amb:
    mt: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.fasta.amb"
    mt_shifted: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.shifted_by_8000_bases.fasta.amb"
  ann:
    mt: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.fasta.ann"
    mt_shifted: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.shifted_by_8000_bases.fasta.ann"
  bwt:
    mt: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.fasta.bwt"
    mt_shifted: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.shifted_by_8000_bases.fasta.bwt"
  pac:
    mt: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.fasta.pac"
    mt_shifted: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.shifted_by_8000_bases.fasta.pac"
  sa:
    mt: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.fasta.sa"
    mt_shifted: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.shifted_by_8000_bases.fasta.sa"

echtvar_anno:
  databases:
    - "{{PIPELINE_REF_DATA}}/gnomad_snvs.zip"

expansionhunter:
  variant_catalog: "config/str_catalog/variant_catalog_hg38.json"

filter_par_dups:
  bed: "{{PIPELINE_REF_DATA}}/cnv_filter_regions.bed"

gatk_lift_over_vcf:
  shift_back_chain: "{{PIPELINE_REF_DATA}}/ShiftBack.chain"

gatk_mutect2:
  interval:
    mt: "{{PIPELINE_REF_DATA}}/non_control_region.chrM.interval_list"
    mt_shifted: "{{PIPELINE_REF_DATA}}/control_region_shifted.chrM.interval_list"

glnexus_peddy:
  extra: "--bed {{PIPELINE_REF_DATA}}/GRCH38.bed "

haplocheck:
  container: "docker://hydragenetics/haplocheck:1.3.3"

manta_config_n:
  extra: "--callRegions {{PIPELINE_REF_DATA}}/GRCh38_chromosomes.bed.gz"

melt:
  bed: "{{PIPELINE_REF_DATA}}/melt/Hg38.genes.bed"
  mei: "{{PIPELINE_REF_DATA}}/melt/mei_list.txt"

mt_reference:
  mt: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.fasta"
  mt_shifted: "{{PIPELINE_REF_DATA}}/Homo_sapiens_assembly38.chrM.shifted_by_8000_bases.fasta"
  blacklist: "{{PIPELINE_REF_DATA}}/blacklist_sites.hg38.chrM.bed"

svdb_query:
  db_string: "--db {{PIPELINE_REF_DATA}}/manta_wgs_hg38_novaseqX_v2.0.sorted.vcf.gz,{{PIPELINE_REF_DATA}}/cnvpytor_wgs_hg38_novaseqX_v2.0.sorted.vcf.gz,{{PIPELINE_REF_DATA}}/gnomad.v4.1.sv.sites.no_cnv.PASS.vcf.gz"
  extra: "--in_frq FRQ,FRQ,AF --in_occ OCC,OCC,AC --out_frq manta_FRQ,cnvpytor_FRQ,gnomad_AF --out_occ manta_OCC,cnvpytor_OCC,gnomad_AC "

vep:
  vep_cache: "{{PIPELINE_REF_DATA}}/VEP"

vep_svdb:
  vep_cache: "{{PIPELINE_REF_DATA}}/VEP"

verifybamid2:
  svd_mu: "{{PIPELINE_REF_DATA}}/1000g.phase3.100k.b38.vcf.gz.dat.mu"
